<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Chess Platform</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="flex justify-center items-center min-h-screen bg-cover bg-center"
    style="background-image: url(https://www.magnific.com/free-vector/chess-king-abstract-low-poly-design-strategy-concept-from-dot-line-vector-illustration_24126552.htm#fromView=keyword&page=1&position=8&uuid=b0e91d3b-f896-4df1-a8f9-7c4b090b8270&query=Chess+king,
        );"
>

    
    <div class="bg-white/90 backdrop-blur-sm p-8 rounded-xl shadow-2xl w-96">

        <h2 class="text-3xl font-bold text-center mb-2">
            Login
        </h2>

        <p class="text-center text-gray-600 mb-6">
            Welcome back , Streatigist
        </p>

        <form>

            <!-- Email -->
            <div class="mb-4">
                <label class="block mb-2 font-medium">
                    Email Address
                </label>

                <input
                    type="email"
                    placeholder="Enter your email"
                    class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500"
                    required
                >
            </div>

            <!-- Password -->
            <div class="mb-2">
                <label class="block mb-2 font-medium">
                    Password
                </label>

                <input
                    type="password"
                    placeholder="Enter your password"
                    class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500"
                    required
                >
            </div>

            
            <div class="text-right mb-5">
                <a
                    href="#"
                    class="text-blue-600 hover:underline text-sm"
                >
                    Forgot Password?
                </a>
            </div>

            
            <button
                type="submit"
                class="w-full bg-yellow-500 hover:bg-yellow-600 text-black py-3 rounded-lg font-bold transition duration-300"
            >
                Login
            </button>

        </form>

        
        <div class="text-center mt-6">

            <p class="text-gray-600">
                Don't have an account?
            </p>

            <a
                href="register.html"
                class="text-blue-600 font-semibold hover:underline"
            >
                Create New Account
            </a>

        </div>

    </div>

</body>
</html>
